plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

javafx {
    version = "21.0.2"
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

version = '1.0-prototype'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

def javafxVersion = '21.0.2'

dependencies {
    implementation "org.openjfx:javafx-base:${javafxVersion}:win"
    implementation "org.openjfx:javafx-controls:${javafxVersion}:win"
    implementation "org.openjfx:javafx-graphics:${javafxVersion}:win"
    implementation "org.openjfx:javafx-fxml:${javafxVersion}:win"
    
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.0'
}

application {
    mainClass = 'com.floydwarshall.App'
}

run {
    mainClass = 'com.floydwarshall.App'
    jvmArgs = [
        '--module-path', configurations.runtimeClasspath.asPath,
        '--add-modules', 'javafx.controls,javafx.fxml'
    ]
}

test {
    useJUnitPlatform()
}

task fatJar(type: Jar) {
    archiveClassifier = 'all' 
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    manifest {
        // IMPORTANT: Point to Launcher, not App
        attributes 'Main-Class': 'com.floydwarshall.Launcher'
    }
    
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    
    // Exclude module-info to prevent conflicts
    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA', '**/module-info.class'
    
    with jar
}

// Standard JAR configuration
jar {
    manifest {
        attributes 'Main-Class': 'com.floydwarshall.Launcher'
    }
}